name: Workspace Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workspace-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workspace-test:
    # libforge hosts the reusable workflow, so it calls its own copy locally.
    uses: ./.github/workflows/go-workspace-test.yml
